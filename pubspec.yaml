name: habit_mastery_league
description: A Flutter habit tracking app for graduate-level mobile application project requirements.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.3.3
  path: ^1.9.0
  uuid: ^4.4.0
  fl_chart: ^0.68.0
  confetti: ^0.7.0
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/